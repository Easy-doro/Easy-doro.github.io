    <script>
        // Fonction pour afficher ou masquer le bouton "Back to top" en fonction de la position de défilement
        function toggleBackToTopButton() {
            var topBtn = document.getElementById("topBtn");
            if (document.body.scrollTop > 20 || document.documentElement.scrollTop > 20) {
                topBtn.style.display = "block";
            } else {
                topBtn.style.display = "none";
            }
        }

        // Ajoutez un écouteur d'événements pour déclencher la fonction lorsque l'utilisateur fait défiler la page
        window.onscroll = function() {
            toggleBackToTopButton();
        };

        // Déclenchez la fonction une fois au chargement de la page pour vérifier l'état initial
        toggleBackToTopButton();

        // Fonction pour vérifier si un élément est visible dans la fenêtre
        function isElementInViewport(el) {
            var rect = el.getBoundingClientRect();
            return (
                rect.top >= 0 &&
                rect.left >= 0 &&
                rect.bottom <= (window.innerHeight || document.documentElement.clientHeight) &&
                rect.right <= (window.innerWidth || document.documentElement.clientWidth)
            );
        }

        // Fonction pour vérifier si un élément est visible dans la fenêtre
        function isElementInViewport(el) {
            var rect = el.getBoundingClientRect();
            return (
                rect.top >= 0 &&
                rect.left >= 0 &&
                rect.bottom <= (window.innerHeight || document.documentElement.clientHeight) &&
                rect.right <= (window.innerWidth || document.documentElement.clientWidth)
            );
        }

        // Fonction pour animer les images lorsqu'elles deviennent visibles
        function animateOnScroll() {
            var galleryImages = document.querySelectorAll('.gallery img');
            
            galleryImages.forEach(function(image) {
                if (isElementInViewport(image) && !image.classList.contains('animate')) {
                    // Ajoutez une classe pour marquer l'image comme animée
                    image.classList.add('animate');
                    // Réglez la propriété CSS pour que l'image reste à sa position finale
                    image.style.opacity = 1;
                    image.style.marginLeft = '0%';
                }
            });
        }

        // Écouteur d'événements pour déclencher l'animation au défilement de la page
        window.addEventListener('scroll', function() {
            // Déclencher l'animation une seule fois au chargement de la page pour les images initialement visibles
            animateOnScroll();
        });

        // Déclencher l'animation une fois au chargement de la page pour les images initialement visibles
        animateOnScroll();
    </script>
